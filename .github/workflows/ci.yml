name: CI

on:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Tudo no ubuntu-latest: evita rede instável do Kali (artifact/GHCR).
  # Sem POI o native cabe no runner GitHub-hosted (container-build).
  build-and-push:
    name: Native + GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      MAVEN_OPTS: -Xmx2g
      QUARKUS_PROFILE: prod
      JIRA_BASE_URL: https://example.atlassian.net
      JIRA_API_EMAIL: ci@example.com
      JIRA_API_TOKEN: ci-build-placeholder
      MICROSOFT_CLIENT_ID: ci-build-placeholder
      DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/relatorio-jira

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Testes
        run: |
          set -euo pipefail
          chmod +x ./mvnw
          ./mvnw test -DskipITs --batch-mode

      - name: Build nativo (container-build)
        run: |
          set -euo pipefail
          free -h
          NATIVE_ARGS="-H:NumberOfThreads=2,-H:DeadlockWatchdogInterval=60,-march=x86-64-v3"
          ./mvnw package -Dnative -DskipTests --batch-mode \
            -Dquarkus.native.container-build=true \
            -Dquarkus.native.native-image-xmx=6g \
            -Dquarkus.native.additional-build-args="${NATIVE_ARGS}"
          BINARY="target/relatorio-jira-1.0.0-SNAPSHOT-runner"
          test -f "$BINARY"
          chmod +x "$BINARY"
          ls -lh "$BINARY"

      - name: Login GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build e push (somente latest)
        run: |
          set -euo pipefail
          IMAGE="$(echo "${DOCKER_IMAGE}" | tr '[:upper:]' '[:lower:]')"
          echo "Build/push ${IMAGE}:latest"
          docker build \
            -f src/main/docker/Dockerfile.native-micro \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:latest"
          echo "OK: ${IMAGE}:latest"
