name: CI

on:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Rede do Kali → GHCR está instável (0 B/s / broken pipe).
  # Build nativo no self-hosted; push da imagem no GitHub-hosted.
  native-build:
    name: Build nativo (self-hosted)
    runs-on: self-hosted

    env:
      MAVEN_OPTS: -Xmx1536m
      QUARKUS_PROFILE: prod
      JIRA_BASE_URL: https://example.atlassian.net
      JIRA_API_EMAIL: ci@example.com
      JIRA_API_TOKEN: ci-build-placeholder
      MICROSOFT_CLIENT_ID: ci-build-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven

      - name: Testes
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./mvnw
          ./mvnw test -DskipITs --batch-mode

      - name: Verificar zlib1g-dev
        shell: bash
        run: |
          set -euo pipefail
          if dpkg -s zlib1g-dev >/dev/null 2>&1; then
            echo "zlib1g-dev já instalado."
          elif [ "$(id -u)" -eq 0 ]; then
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends zlib1g-dev
          elif sudo -n true 2>/dev/null; then
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends zlib1g-dev
          else
            echo "Instale no runner: sudo apt-get install -y zlib1g-dev"
            exit 1
          fi

      - name: Build nativo
        shell: bash
        run: |
          set -euo pipefail

          MEM_AVAILABLE_MB=$(awk '/MemAvailable:/ {print int($2 / 1024)}' /proc/meminfo)
          SWAP_FREE_MB=$(free -m | awk '/^Swap:/ {print ($2 > 0) ? $4 : 0}')
          CPU_COUNT=$(nproc)

          USABLE_MB=$((MEM_AVAILABLE_MB + SWAP_FREE_MB))
          MAVEN_MB=512
          OS_BUFFER_MB=1024
          NATIVE_MB=$((USABLE_MB - MAVEN_MB - OS_BUFFER_MB))
          NATIVE_GB=$((NATIVE_MB / 1024))

          if [ "$NATIVE_GB" -lt 6 ]; then
            echo "Erro: memória insuficiente (disponível: ${USABLE_MB}MB)."
            free -h
            exit 1
          fi

          if [ "$CPU_COUNT" -gt 8 ]; then
            BUILD_THREADS=8
          else
            BUILD_THREADS=$CPU_COUNT
          fi

          export MAVEN_OPTS="-Xmx${MAVEN_MB}m"
          export QUARKUS_NATIVE_NATIVE_IMAGE_XMX="${NATIVE_GB}g"

          NATIVE_ARGS="-J-Xmx${NATIVE_GB}g"
          NATIVE_ARGS="${NATIVE_ARGS},-H:NumberOfThreads=${BUILD_THREADS}"
          NATIVE_ARGS="${NATIVE_ARGS},-O3"
          NATIVE_ARGS="${NATIVE_ARGS},-march=x86-64-v3"

          echo "native-image ${NATIVE_GB}g, ${BUILD_THREADS} threads"
          free -h

          ./mvnw package -Dnative -DskipTests --batch-mode \
            -Dquarkus.native.container-build=false \
            -Dquarkus.native.native-image-xmx="${NATIVE_GB}g" \
            -Dquarkus.native.additional-build-args="${NATIVE_ARGS}"

          BINARY="target/relatorio-jira-1.0.0-SNAPSHOT-runner"
          test -f "$BINARY"
          chmod +x "$BINARY"
          ls -lh "$BINARY"

      - name: Upload binário nativo
        uses: actions/upload-artifact@v4
        with:
          name: native-runner
          path: target/relatorio-jira-1.0.0-SNAPSHOT-runner
          if-no-files-found: error
          retention-days: 1

  docker-push:
    name: Imagem GHCR (ubuntu-latest)
    needs: native-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/relatorio-jira

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binário nativo
        uses: actions/download-artifact@v4
        with:
          name: native-runner
          path: target

      - name: Preparar binário
        run: |
          set -euo pipefail
          chmod +x target/relatorio-jira-1.0.0-SNAPSHOT-runner
          ls -lh target/relatorio-jira-1.0.0-SNAPSHOT-runner

      - name: Login GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build e push (somente latest)
        run: |
          set -euo pipefail
          IMAGE="$(echo "${DOCKER_IMAGE}" | tr '[:upper:]' '[:lower:]')"
          echo "Build/push ${IMAGE}:latest"
          docker build \
            -f src/main/docker/Dockerfile.native-micro \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:latest"
          echo "OK: ${IMAGE}:latest"
