name: CI

on:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-native-build:
    name: Testes e build nativo
    runs-on: self-hosted
    environment: DOCKERHUB

    env:
      MAVEN_OPTS: -Xmx1536m
      QUARKUS_PROFILE: prod
      DOCKER_IMAGE: oliveiraclaudio/relatorio-jira
      JIRA_BASE_URL: https://example.atlassian.net
      JIRA_API_EMAIL: ci@example.com
      JIRA_API_TOKEN: ci-build-placeholder
      MICROSOFT_CLIENT_ID: ci-build-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven

      - name: Preparar e testar
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./mvnw
          ./mvnw test -DskipITs --batch-mode

      - name: Verificar dependências do build nativo (Ubuntu)
        shell: bash
        run: |
          set -euo pipefail

          if dpkg -s zlib1g-dev >/dev/null 2>&1; then
            echo "zlib1g-dev já instalado."
          elif [ "$(id -u)" -eq 0 ]; then
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends zlib1g-dev
          elif sudo -n true 2>/dev/null; then
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends zlib1g-dev
          else
            echo "Erro: zlib1g-dev não está instalado e o runner não tem sudo sem senha."
            echo "  sudo apt-get update && sudo apt-get install -y zlib1g-dev"
            exit 1
          fi

      - name: Build nativo
        shell: bash
        run: |
          set -euo pipefail

          MEM_AVAILABLE_MB=$(awk '/MemAvailable:/ {print int($2 / 1024)}' /proc/meminfo)
          SWAP_FREE_MB=$(free -m | awk '/^Swap:/ {print ($2 > 0) ? $4 : 0}')
          CPU_COUNT=$(nproc)

          USABLE_MB=$((MEM_AVAILABLE_MB + SWAP_FREE_MB))
          MAVEN_MB=512
          OS_BUFFER_MB=1024
          NATIVE_MB=$((USABLE_MB - MAVEN_MB - OS_BUFFER_MB))
          NATIVE_GB=$((NATIVE_MB / 1024))

          if [ "$NATIVE_GB" -lt 6 ]; then
            echo "Erro: memória insuficiente para build nativo (disponível: ${USABLE_MB}MB, mínimo: ~7GB)."
            free -h
            exit 1
          fi

          if [ "$CPU_COUNT" -gt 8 ]; then
            BUILD_THREADS=8
          else
            BUILD_THREADS=$CPU_COUNT
          fi

          export MAVEN_OPTS="-Xmx${MAVEN_MB}m"
          export QUARKUS_NATIVE_NATIVE_IMAGE_XMX="${NATIVE_GB}g"

          NATIVE_ARGS="-J-Xmx${NATIVE_GB}g"
          NATIVE_ARGS="${NATIVE_ARGS},-H:NumberOfThreads=${BUILD_THREADS}"
          NATIVE_ARGS="${NATIVE_ARGS},-O3"
          NATIVE_ARGS="${NATIVE_ARGS},-march=x86-64-v3"

          echo "Memória: ${USABLE_MB}MB → native-image ${NATIVE_GB}g, ${BUILD_THREADS} threads"
          free -h

          ./mvnw package -Dnative -DskipTests --batch-mode \
            -Dquarkus.native.container-build=false \
            -Dquarkus.native.native-image-xmx="${NATIVE_GB}g" \
            -Dquarkus.native.additional-build-args="${NATIVE_ARGS}"

          BINARY="target/relatorio-jira-1.0.0-SNAPSHOT-runner"
          test -f "$BINARY"
          chmod +x "$BINARY"
          ls -lh "$BINARY"

      - name: Build imagem Docker
        shell: bash
        run: |
          set -euo pipefail
          echo "Tags: ${DOCKER_IMAGE}:${GITHUB_SHA} e ${DOCKER_IMAGE}:latest"
          docker build \
            -f src/main/docker/Dockerfile.native-micro \
            -t "${DOCKER_IMAGE}:${GITHUB_SHA}" \
            -t "${DOCKER_IMAGE}:latest" \
            .

      - name: Push imagem Docker Hub
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          # Evita falha TLS intermitente com Cloudflare (ML-KEM / Go)
          GODEBUG: tlsmlkem=0
        run: |
          set -euo pipefail
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          push_with_retry() {
            local ref="$1"
            local attempt=1
            local max=5
            # 15 min por tentativa — layer do native pode ser grande / rede instável
            local timeout_secs=900

            until timeout --signal=TERM --kill-after=30 "$timeout_secs" docker push "$ref"; do
              local rc=$?
              if [ "$attempt" -ge "$max" ]; then
                echo "Falha ao fazer push de ${ref} após ${max} tentativas (último exit=${rc})."
                exit 1
              fi
              echo "Push interrompido/falhou (exit=${rc}). Retry ${attempt}/${max}..."
              attempt=$((attempt + 1))
              sleep $((attempt * 5))
              echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            done
            echo "OK: ${ref}"
          }

          echo "Pushing ${DOCKER_IMAGE}:${GITHUB_SHA}"
          push_with_retry "${DOCKER_IMAGE}:${GITHUB_SHA}"

          echo "Pushing ${DOCKER_IMAGE}:latest"
          push_with_retry "${DOCKER_IMAGE}:latest"
