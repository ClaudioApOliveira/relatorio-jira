# Native Image: DTOs tipados no Rest Client — Quarkus indexa em build-time.
# Não usar @RegisterForReflection / reflection-config.json neste projeto.

# Jira REST Client (obrigatórias via env)
quarkus.rest-client.jira.url=${JIRA_BASE_URL}
quarkus.rest-client.jira.connect-timeout=60000
quarkus.rest-client.jira.read-timeout=120000

jira.api.email=${JIRA_API_EMAIL}
jira.api.token=${JIRA_API_TOKEN}

# Microsoft Graph — Excel Online
quarkus.rest-client.ms-login.url=https://login.microsoftonline.com
quarkus.rest-client.ms-graph.url=https://graph.microsoft.com
quarkus.rest-client.ms-login.connect-timeout=60000
quarkus.rest-client.ms-login.read-timeout=60000
quarkus.rest-client.ms-graph.connect-timeout=60000
quarkus.rest-client.ms-graph.read-timeout=180000

# OneDrive pessoal → delegated (device code)
microsoft.auth-mode=delegated
# App "Personal accounts only" → consumers | "Org + personal" → common
microsoft.delegated-tenant-id=consumers
# MICROSOFT_CLIENT_ID obrigatório. App Registration deve aceitar contas pessoais.
microsoft.token-store=.microsoft-graph-token.json
# Pasta base no OneDrive (sempre resolve arquivos dentro dela)
microsoft.excel.onedrive-base-folder=VERTEXCODE LTDA

# Native + POI/AWT: no macOS use container-build (ver profile native no pom.xml).
quarkus.native.resources.includes=org/apache/poi/**/*,org/openxmlformats/**/*
